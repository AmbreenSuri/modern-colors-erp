<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Modern Colours">
  <!-- Favicon: the three-petal mark on the brand's ink chip so it holds shape
       against both light and dark browser tab bars. Geometry matches
       /brand/mark.svg — see that file for why the mark is drawn, not traced. -->
  <rect width="100" height="100" rx="22" fill="#1B1310"/>
  <g fill="none" stroke-width="11" stroke-linecap="round" transform="translate(0 4) scale(0.92) translate(4 0)">
    <ellipse stroke="#8802C9" cx="50" cy="38" rx="13" ry="23" transform="rotate(-38 50 72)"/>
    <ellipse stroke="#FEEF03" cx="50" cy="38" rx="13" ry="23"/>
    <ellipse stroke="#EB0102" cx="50" cy="38" rx="13" ry="23" transform="rotate(38 50 72)"/>
  </g>
</svg>
